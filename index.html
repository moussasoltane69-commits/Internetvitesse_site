<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SpeedTest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/librespeed@latest/build/speedtest.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #050a14; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* التعديل الجمالي الجديد */
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        
        .gauge-wrapper { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--neon); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(0,210,255,0.2); }
        .gauge { font-size: 50px; font-weight: 800; color: #fff; text-shadow: 0 0 10px var(--neon); }
        
        .btn { margin-top: 20px; padding: 15px 40px; background: linear-gradient(135deg, var(--neon), #3a7bd5); border: none; color: white; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }

        #resultPage { display: none; }
        .stat-grid { display: flex; justify-content: space-around; margin: 20px 0; gap: 20px; }
        .stat b { font-size: 20px; color: var(--neon); display: block; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="mainUI">
            <div class="gauge-wrapper">
                <div class="gauge" id="speed">0</div>
                <div style="color:var(--neon)">Mbps</div>
            </div>
            <button class="btn" id="startBtn" onclick="startTest()">بدء الاختبار</button>
        </div>

        <div id="resultPage">
            <h2 style="color:var(--neon)">النتائج النهائية</h2>
            <div class="stat-grid">
                <div class="stat">التحميل<br><b id="resDl">0</b></div>
                <div class="stat">البنج<br><b id="resPing">0</b></div>
                <div class="stat">الرفع<br><b id="resUl">0</b></div>
            </div>
            <button class="btn" onclick="location.reload()">اختبار جديد</button>
        </div>
    </div>

    <script>
        function startTest() {
            document.getElementById('startBtn').style.display = 'none';
            const s = new Speedtest();
            s.onUpdate = (data) => {
                document.getElementById('speed').innerText = Math.round(data.dlStatus);
                if(data.testState === 4) {
                    document.getElementById('mainUI').style.display = 'none';
                    document.getElementById('resultPage').style.display = 'block';
                    document.getElementById('resDl').innerText = Math.round(data.dlStatus) + " M";
                    document.getElementById('resPing').innerText = Math.round(data.pingStatus) + " ms";
                    document.getElementById('resUl').innerText = Math.round(data.ulStatus) + " M";
                }
            };
            s.start();
        }
    </script>
</body>
</html>
