<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/librespeed@latest/build/speedtest.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #050a14; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* تصميم العداد المطابق للصورة */
        .gauge-wrapper { width: 280px; height: 280px; border-radius: 50%; border: 6px solid #1a2a40; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(0,210,255,0.2); }
        .gauge { font-size: 60px; font-weight: 800; color: var(--neon); }
        
        .btn { margin-top: 30px; padding: 18px 50px; background: linear-gradient(135deg, var(--neon), #3a7bd5); border: none; color: white; border-radius: 50px; font-size: 18px; cursor: pointer; }
        
        /* نتائج احترافية */
        #resultPage { display: none; text-align: center; background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid var(--neon); }
        .stats-grid { display: flex; gap: 20px; margin: 20px 0; }
        .stat-item { background: #1e293b; padding: 15px; border-radius: 15px; flex: 1; }
        .stat-item b { display: block; font-size: 20px; color: var(--neon); }
    </style>
</head>
<body>

    <div id="mainUI">
        <div class="gauge-wrapper">
            <div class="gauge" id="speed">0</div>
            <div style="opacity: 0.7;">Mbps</div>
        </div>
        <button class="btn" id="startBtn" onclick="runSpeedTest()">بدء الاختبار</button>
    </div>

    <div id="resultPage">
        <h2 style="color:var(--neon)">النتائج النهائية</h2>
        <div class="stats-grid">
            <div class="stat-item">التحميل<br><b id="resDl">0</b></div>
            <div class="stat-item">البنج<br><b id="resPing">0</b></div>
        </div>
        <div class="stat-item">الرفع<br><b id="resUl">0</b></div>
        <br>
        <button class="btn" onclick="location.reload()">اختبار جديد</button>
    </div>

    <script>
        function runSpeedTest() {
            document.getElementById('startBtn').style.display = 'none';
            // تهيئة المحرك
            const s = new Speedtest();
            s.onUpdate = (data) => {
                // تحديث العداد أثناء الاختبار
                document.getElementById('speed').innerText = Math.round(data.dlStatus);
                
                // التحقق من حالة الانتهاء (حالة 4 = اكتمل الاختبار)
                if(data.testState === 4) {
                    document.getElementById('mainUI').style.display = 'none';
                    document.getElementById('resultPage').style.display = 'block';
                    document.getElementById('resDl').innerText = Math.round(data.dlStatus) + " Mbps";
                    document.getElementById('resPing').innerText = Math.round(data.pingStatus) + " ms";
                    document.getElementById('resUl').innerText = Math.round(data.ulStatus) + " Mbps";
                }
            };
            s.start();
        }
    </script>
</body>
</html>
