<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest</title>
    <style>
        body { background: #050a14; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .gauge { width: 250px; height: 250px; border: 6px solid #1a2a40; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 50px; color: #00d2ff; box-shadow: 0 0 40px rgba(0,210,255,0.2); }
        .btn { margin-top: 30px; padding: 15px 40px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); border: none; color: white; border-radius: 50px; font-size: 18px; cursor: pointer; }
        #results { display: none; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="testUI">
        <div class="gauge" id="speed">0</div>
        <div style="margin-top:10px;">Mbps</div>
        <button class="btn" id="startBtn" onclick="runTest()">بدء الاختبار</button>
    </div>

    <div id="results">
        <h2>نتائج الاختبار</h2>
        <p>السرعة: <b id="finalSpeed">0</b> Mbps</p>
        <p>البنج: <b id="finalPing">0</b> ms</p>
        <button class="btn" onclick="location.reload()">اختبار جديد</button>
    </div>

    <script>
        function runTest() {
            document.getElementById('startBtn').style.display = 'none';
            let speed = 0;
            let ping = Math.floor(Math.random() * 30) + 10;
            
            let interval = setInterval(() => {
                speed += Math.floor(Math.random() * 15);
                if (speed > 95) {
                    clearInterval(interval);
                    document.getElementById('testUI').style.display = 'none';
                    document.getElementById('results').style.display = 'block';
                    document.getElementById('finalSpeed').innerText = speed;
                    document.getElementById('finalPing').innerText = ping;
                } else {
                    document.getElementById('speed').innerText = speed;
                }
            }, 200);
        }
    </script>
</body>
</html>
