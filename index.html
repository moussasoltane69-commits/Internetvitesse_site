<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/librespeed@latest/build/speedtest.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #050a14; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #mainUI { text-align: center; }
        .gauge-wrapper { width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, #1a2a40, #050a14); border: 4px solid #1a2a40; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(0,210,255,0.2); }
        .gauge { font-size: 45px; font-weight: 800; color: var(--neon); }
        
        .btn { margin-top: 30px; padding: 15px 50px; background: linear-gradient(135deg, var(--neon), #3a7bd5); border: none; color: white; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.4s; }
        .btn:hover { transform: scale(1.05); }

        #resultPage { display: none; text-align: center; background: rgba(26, 42, 64, 0.8); padding: 40px; border-radius: 30px; border: 1px solid var(--neon); backdrop-filter: blur(15px); }
        .stat-box { display: flex; gap: 40px; margin: 25px 0; }
        .stat { font-size: 14px; color: #aaa; }
        .stat b { font-size: 22px; color: var(--neon); display: block; }
    </style>
</head>
<body>

    <div id="mainUI">
        <div class="gauge-wrapper"><div class="gauge" id="speed">0</div></div>
        <div style="margin-top:10px; opacity:0.7; font-size: 18px;">Mbps</div>
        <button class="btn" id="startBtn" onclick="startTest()">بدء الاختبار</button>
    </div>

    <div id="resultPage">
        <h2 style="color:var(--neon)">نتائج الاختبار</h2>
        <div class="stat-box">
            <div class="stat">البنج<br><b id="resPing">0</b> ms</div>
            <div class="stat">الرفع<br><b id="resUl">0</b> Mbps</div>
        </div>
        <button class="btn" onclick="location.reload()">اختبار جديد</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone() {
            let osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.frequency.value = 350;
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
        }

        function startTest() {
            document.getElementById('startBtn').style.display = 'none';
            const s = new Speedtest();
            s.onUpdate = (data) => {
                let val = Math.round(data.dlStatus);
                document.getElementById('speed').innerText = val;
                if(val > 0) playTone();
                if(data.testState === 4) {
                    document.getElementById('mainUI').style.display = 'none';
                    document.getElementById('resultPage').style.display = 'block';
                    document.getElementById('resPing').innerText = Math.round(data.pingStatus);
                    document.getElementById('resUl').innerText = Math.round(data.ulStatus);
                }
            };
            s.start();
        }
    </script>
</body>
</html>
