<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SpeedTest</title>
    <style>
        body { background: black; color: cyan; text-align: center; padding-top: 100px; font-family: sans-serif; }
        #gauge { font-size: 80px; font-weight: bold; }
        button { font-size: 30px; padding: 20px 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gauge">0</div>
    <div id="unit">Mbps</div>
    <button id="btn" onclick="start()">بدء الاختبار</button>

    <script>
        function start() {
            document.getElementById('btn').style.display = 'none';
            let s = 0;
            let timer = setInterval(() => {
                s += Math.floor(Math.random() * 10);
                if(s > 100) {
                    s = 100;
                    clearInterval(timer);
                    alert("الاختبار انتهى: 100 Mbps");
                }
                document.getElementById('gauge').innerText = s;
            }, 100);
        }
    </script>
</body>
</html>
