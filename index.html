<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELOX SPEED TEST PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#050d1a;
  color:#fff;
  font-family:Orbitron;
  overflow-x:hidden;
}

header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #00f5ff33;
}

.logo{
  color:#00f5ff;
  font-weight:800;
  letter-spacing:3px;
}

.container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

.panel{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,245,255,0.2);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
}

.speed{
  text-align:center;
  font-size:60px;
  color:#00f5ff;
}

.unit{
  text-align:center;
  color:#aaa;
}

button{
  margin-top:20px;
  width:100%;
  padding:15px;
  border-radius:30px;
  border:1px solid #00f5ff;
  background:transparent;
  color:#00f5ff;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00f5ff22;
}

.graph{
  height:120px;
  display:flex;
  align-items:flex-end;
  gap:3px;
}

.bar{
  width:4px;
  background:#00ffaa;
  height:10px;
  transition:0.2s;
}

.info{
  font-size:12px;
  color:#aaa;
  line-height:1.8;
}
</style>
</head>

<body>

<header>
  <div class="logo">VELOX SPEED TEST</div>
  <div id="status">READY</div>
</header>

<div class="container">

  <div class="panel">
    <div class="speed" id="speed">0</div>
    <div class="unit">Mbps</div>

    <button onclick="startTest()" id="btn">START TEST</button>

    <div class="graph" id="graph"></div>
  </div>

  <div class="panel">
    <h3>NETWORK INFO</h3>
    <div class="info" id="info">
      Loading...
    </div>
  </div>

</div>

<script>
let graph = document.getElementById("graph");

for(let i=0;i<40;i++){
  let b = document.createElement("div");
  b.className="bar";
  graph.appendChild(b);
}

function randomBars(){
  document.querySelectorAll(".bar").forEach(b=>{
    b.style.height = Math.random()*100 + "px";
  });
}

async function getIP(){
  try{
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();
    document.getElementById("info").innerHTML =
      `IP: ${data.ip}<br>
       City: ${data.city}<br>
       ISP: ${data.org}`;
  }catch(e){
    document.getElementById("info").innerHTML = "Network info unavailable";
  }
}

getIP();

function startTest(){
  let speed = 0;
  let el = document.getElementById("speed");
  let btn = document.getElementById("btn");
  let status = document.getElementById("status");

  btn.disabled = true;
  status.innerText = "TESTING...";

  let i = setInterval(()=>{
    speed += Math.random()*15;
    el.innerText = speed.toFixed(1);
    randomBars();

    if(speed > 120){
      clearInterval(i);
      btn.disabled = false;
      status.innerText = "DONE";
    }
  },200);
}
</script>

</body>
</html>
